spring.application.name=processing-service
server.port=8082

app.io-service.base-url=${IO_SERVICE_BASE_URL:http://localhost:8083}
app.messaging.request-created-exchange=${REQUEST_CREATED_EXCHANGE:service.request.exchange}
app.messaging.request-created-queue=${REQUEST_CREATED_QUEUE:service.request.created.queue}
app.messaging.request-created-routing-key=${REQUEST_CREATED_ROUTING_KEY:service.request.created}
app.scheduler.enabled=${PROCESSING_SCHEDULER_ENABLED:true}
app.scheduler.poll-delay=${PROCESSING_POLL_DELAY:10s}

management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest